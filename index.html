<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>中日ドラゴンズファンサイト</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#0046ad;
color:white;
text-align:center;
padding:20px;
}

nav{
background:#222;
text-align:center;
padding:10px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

section{
padding:40px;
text-align:center;
}

h2{
margin-bottom:30px;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
max-width:900px;
margin:auto;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

#modal{
display:none;
position:fixed;
z-index:1000;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

#modal img{
max-width:80%;
max-height:80%;
}

#close{
position:absolute;
top:30px;
right:50px;
font-size:40px;
color:white;
cursor:pointer;
}

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>中日ドラゴンズファンサイト</h1>
<p>Dragons Fan Site</p>
</header>

<nav>
<a href="#">ホーム</a>
<a href="#">選手</a>
<a href="#">試合</a>
<a href="#">球場</a>
</nav>

<section>

<h2>球場ギャラリー</h2>

<div class="gallery">

<img src="images.jpeg" class="gallery-img">
<img src="images%20(1).jpeg" class="gallery-img">
<img src="images%20(2).jpeg" class="gallery-img">

</div>

</section>

<div id="modal">
<span id="close">&times;</span>
<img id="modal-img">
</div>

<footer>
<p>© Dragons Fan Site</p>
</footer>

<script>

const images = document.querySelectorAll(".gallery-img");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");
const closeBtn = document.getElementById("close");

images.forEach(img=>{
img.addEventListener("click",()=>{
modal.style.display="flex";
modalImg.src=img.src;
});
});

closeBtn.onclick=()=>{
modal.style.display="none";
};

modal.onclick=()=>{
modal.style.display="none";
};

</script>

</body>
</html>
