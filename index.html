<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>中日ドラゴンズファンサイト</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

h2{
text-align:center;
margin-top:40px;
}

section{
padding:40px;
}

header{
background:#0046ad;
color:white;
text-align:center;
padding:20px;
}

nav ul{
display:flex;
justify-content:center;
gap:20px;
list-style:none;
padding:0;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* スライド */

.slider{
width:100%;
height:450px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 2s;
}

.slide.active{
opacity:1;
}

/* NEWS */

.news{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.news-card{
background:white;
padding:20px;
border-radius:10px;
width:250px;
}

/* 選手 */

.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.player{
text-align:center;
cursor:pointer;
}

.player img{
width:100%;
border-radius:10px;
}

/* モーダル */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

.modal-content{
background:white;
width:90%;
max-width:700px;
margin:80px auto;
padding:20px;
border-radius:10px;
}

.close{
float:right;
font-size:30px;
cursor:pointer;
}

/* 成績表 */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

/* 動画 */

.video{
text-align:center;
}

video{
width:80%;
max-width:800px;
border-radius:10px;
}

canvas{
max-width:800px;
margin:auto;
display:block;
}

</style>

</head>



<body>

<header>

<h1>中日ドラゴンズファンサイト</h1>

<nav>
<ul>
<li><a href="#news">NEWS</a></li>
<li><a href="#players">選手名鑑</a></li>
<li><a href="#video">ハイライト</a></li>
<li><a href="#team">チーム成績</a></li>
</ul>
</nav>

</header>



<!-- スライド -->

<div class="slider">

<img class="slide active" src="stadium1.jpg">
<img class="slide" src="stadium2.jpg">
<img class="slide" src="stadium3.jpg">

</div>



<!-- NEWS -->

<section id="news">

<h2>ドラゴンズNEWS</h2>

<div class="news">

<div class="news-card">
<h3>高橋宏斗 好投</h3>
<p>エースが7回無失点の好投</p>
</div>

<div class="news-card">
<h3>岡林 猛打賞</h3>
<p>リードオフマンが3安打</p>
</div>

<div class="news-card">
<h3>石川昂弥 ホームラン</h3>
<p>若き主砲が決勝弾</p>
</div>

</div>

</section>



<!-- 選手名鑑 -->

<section id="players">

<h2>選手名鑑</h2>

<div class="players">

<div class="player" onclick="showPlayer('takahashi')">
<img src="takahashi.jpeg">
<p>高橋宏斗</p>
</div>

<div class="player" onclick="showPlayer('yanagi')">
<img src="yanagi.jpeg">
<p>柳裕也</p>
</div>

<div class="player" onclick="showPlayer('okabayashi')">
<img src="okabayashi.jpg">
<p>岡林勇希</p>
</div>

<div class="player" onclick="showPlayer('ishikawa')">
<img src="ishikawa.jpg">
<p>石川昂弥</p>
</div>

</div>

</section>



<!-- ハイライト -->

<section id="video">

<h2>試合ハイライト</h2>

<div class="video">

<video controls>

<source src="videoplayback.mp4" type="video/mp4">

</video>

</div>

</section>



<!-- チーム成績 -->

<section id="team">

<h2>チーム成績（過去10年）</h2>

<canvas id="teamChart"></canvas>

</section>



<!-- モーダル -->

<div id="playerModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closePlayer()">×</span>

<h2 id="playerName"></h2>

<table id="playerTable"></table>

</div>

</div>



<script>

/* スライド */

let slideIndex=0;

const slides=document.querySelectorAll(".slide");

setInterval(()=>{

slides.forEach(s=>s.classList.remove("active"));

slideIndex++;

if(slideIndex>=slides.length){
slideIndex=0;
}

slides[slideIndex].classList.add("active");

},4000);



/* 選手成績 */

const players={

takahashi:{
name:"高橋宏斗",
table:`
<tr><th>年度</th><th>勝</th><th>敗</th><th>防御率</th></tr>
<tr><td>2022</td><td>6</td><td>7</td><td>2.47</td></tr>
<tr><td>2023</td><td>7</td><td>11</td><td>2.35</td></tr>
<tr><td>2024</td><td>12</td><td>4</td><td>1.80</td></tr>
`
},

yanagi:{
name:"柳裕也",
table:`
<tr><th>年度</th><th>勝</th><th>敗</th><th>防御率</th></tr>
<tr><td>2017</td><td>11</td><td>7</td><td>3.53</td></tr>
<tr><td>2018</td><td>5</td><td>9</td><td>3.15</td></tr>
<tr><td>2019</td><td>11</td><td>7</td><td>2.34</td></tr>
<tr><td>2020</td><td>6</td><td>7</td><td>3.60</td></tr>
<tr><td>2021</td><td>11</td><td>6</td><td>2.20</td></tr>
<tr><td>2022</td><td>9</td><td>11</td><td>3.64</td></tr>
<tr><td>2023</td><td>4</td><td>11</td><td>2.44</td></tr>
`
},

okabayashi:{
name:"岡林勇希",
table:`
<tr><th>年度</th><th>打率</th><th>打点</th><th>本塁打</th><th>盗塁</th></tr>
<tr><td>2021</td><td>.257</td><td>35</td><td>0</td><td>24</td></tr>
<tr><td>2022</td><td>.291</td><td>32</td><td>0</td><td>24</td></tr>
<tr><td>2023</td><td>.279</td><td>31</td><td>3</td><td>12</td></tr>
<tr><td>2024</td><td>.300</td><td>40</td><td>5</td><td>20</td></tr>
`
},

ishikawa:{
name:"石川昂弥",
table:`
<tr><th>年度</th><th>打率</th><th>打点</th><th>本塁打</th><th>盗塁</th></tr>
<tr><td>2020</td><td>.221</td><td>3</td><td>1</td><td>0</td></tr>
<tr><td>2021</td><td>.242</td><td>17</td><td>5</td><td>1</td></tr>
<tr><td>2022</td><td>.225</td><td>19</td><td>5</td><td>1</td></tr>
<tr><td>2023</td><td>.242</td><td>45</td><td>13</td><td>2</td></tr>
<tr><td>2024</td><td>.260</td><td>60</td><td>20</td><td>3</td></tr>
`
}

};

function showPlayer(id){

document.getElementById("playerModal").style.display="block";

document.getElementById("playerName").innerText=players[id].name;

document.getElementById("playerTable").innerHTML=players[id].table;

}

function closePlayer(){

document.getElementById("playerModal").style.display="none";

}



/* チームグラフ */

const ctx=document.getElementById("teamChart");

new Chart(ctx,{
type:"bar",
data:{
labels:["2015","2016","2017","2018","2019","2020","2021","2022","2023","2024"],
datasets:[
{
label:"勝利",
data:[62,58,59,63,68,60,55,66,56,65]
},
{
label:"敗戦",
data:[80,82,79,78,73,76,84,69,82,73]
}
]
}
});

</script>

</body>
</html>
