<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中日ドラゴンズファンサイト</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
    }

    header {
      background-color: #004080;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background-color: #0066cc;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 40px 20px;
    }

    h2 {
      color: #004080;
      text-align: center;
      margin-bottom: 30px;
    }

    /* 選手紹介 */
    .players {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .player-card {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 200px;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .player-card:hover {
      transform: scale(1.05);
    }

    .player-card img {
      width: 100%;
      border-radius: 10px;
    }

    /* 試合ハイライト */
    .highlights {
      text-align: center;
    }

    .highlight-video {
      width: 100%;
      max-width: 720px;
      margin: 0 auto 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    /* ポップアップ用 */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.8);
    }

    .modal-content {
      margin: 5% auto;
      padding: 20px;
      width: 80%;
      max-width: 800px;
      background-color: white;
      border-radius: 10px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 30px;
      font-weight: bold;
      cursor: pointer;
    }

    /* 動画レスポンシブ */
    video {
      width: 100%;
      height: auto;
      border-radius: 10px;
    }

  </style>
</head>
<body>

<header>
  <h1>中日ドラゴンズファンサイト</h1>
</header>

<nav>
  <a href="#players">選手名鑑</a>
  <a href="#highlights">試合ハイライト</a>
</nav>

<section id="players">
  <h2>選手名鑑</h2>
  <div class="players">
    <!-- 岡林選手 -->
    <div class="player-card">
      <img src="images/okabayashi.jpg" alt="岡林選手">
      <p>岡林</p>
    </div>

    <!-- 石川選手 -->
    <div class="player-card">
      <img src="images/ishikawa.jpg" alt="石川選手">
      <p>石川</p>
    </div>

    <!-- 他選手 -->
    <div class="player-card">
      <img src="images/takahashi.jpg" alt="高橋選手">
      <p>高橋宏斗</p>
    </div>
    <!-- 必要に応じて選手を追加 -->
  </div>
</section>

<section id="highlights">
  <h2>試合ハイライト</h2>
  <div class="highlights">
    <!-- 動画埋め込み -->
    <video class="highlight-video" controls>
      <source src="videos/videoplayback.mp4" type="video/mp4">
      お使いのブラウザは動画タグに対応していません。
    </video>
  </div>
</section>

<script>
  // ポップアップ動画用
  const modal = document.createElement('div');
  modal.classList.add('modal');
  modal.innerHTML = `
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <video controls id="modalVideo"></video>
    </div>
  `;
  document.body.appendChild(modal);

  const modalVideo = document.getElementById('modalVideo');
  const playerCards = document.querySelectorAll('.player-card');

  playerCards.forEach(card => {
    card.addEventListener('click', () => {
      // クリックでポップアップ表示
      modal.style.display = 'block';
      modalVideo.src = 'videos/videoplayback.mp4'; // 全員共通動画
      modalVideo.play();
    });
  });

  modal.querySelector('.close-btn').addEventListener('click', () => {
    modal.style.display = 'none';
    modalVideo.pause();
  });

  window.addEventListener('click', (e) => {
    if(e.target === modal) {
      modal.style.display = 'none';
      modalVideo.pause();
    }
  });
</script>

</body>
</html>
