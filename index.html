<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>中日ドラゴンズ応援サイト</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#0046ad;
color:white;
text-align:center;
padding:20px;
}

h2{
text-align:center;
margin-top:40px;
}

/* 選手名鑑 */

.players{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
max-width:1000px;
margin:auto;
padding:20px;
}

.player{
text-align:center;
cursor:pointer;
}

.player img{
width:100%;
border-radius:10px;
}

.player img:hover{
opacity:0.8;
}

.player p{
font-weight:bold;
}

/* モーダル */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

.modal-content{
background:white;
width:90%;
max-width:600px;
margin:80px auto;
padding:20px;
border-radius:10px;
}

.close{
float:right;
font-size:28px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

</style>

</head>


<body>

<header>
<h1>中日ドラゴンズ応援サイト</h1>
</header>


<h2>選手名鑑</h2>

<div class="players">

<div class="player" onclick="showPlayer('takahashi')">
<img src="takahashi.jpeg">
<p>高橋宏斗</p>
</div>

<div class="player" onclick="showPlayer('yanagi')">
<img src="yanagi.jpeg">
<p>柳裕也</p>
</div>

<div class="player" onclick="showPlayer('okabayashi')">
<img src="okabayashi.jpg">
<p>岡林勇希</p>
</div>

<div class="player" onclick="showPlayer('ishikawa')">
<img src="ishikawa.jpg">
<p>石川昂弥</p>
</div>

</div>


<!-- ポップアップ -->

<div id="playerModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closePlayer()">×</span>

<h2 id="playerName"></h2>

<table id="playerTable"></table>

<canvas id="playerGraph"></canvas>

</div>

</div>



<script>

let chart;

function showPlayer(player){

const data={

takahashi:{
name:"高橋宏斗",
years:["2022","2023","2024"],
stats:[2.47,2.35,1.80],
table:`
<tr><th>年</th><th>防御率</th></tr>
<tr><td>2022</td><td>2.47</td></tr>
<tr><td>2023</td><td>2.35</td></tr>
<tr><td>2024</td><td>1.80</td></tr>
`
},

yanagi:{
name:"柳裕也",
years:["2022","2023","2024"],
stats:[3.64,2.44,3.10],
table:`
<tr><th>年</th><th>防御率</th></tr>
<tr><td>2022</td><td>3.64</td></tr>
<tr><td>2023</td><td>2.44</td></tr>
<tr><td>2024</td><td>3.10</td></tr>
`
},

okabayashi:{
name:"岡林勇希",
years:["2022","2023","2024"],
stats:[161,163,150],
table:`
<tr><th>年</th><th>安打</th></tr>
<tr><td>2022</td><td>161</td></tr>
<tr><td>2023</td><td>163</td></tr>
<tr><td>2024</td><td>150</td></tr>
`
},

ishikawa:{
name:"石川昂弥",
years:["2022","2023","2024"],
stats:[9,13,18],
table:`
<tr><th>年</th><th>本塁打</th></tr>
<tr><td>2022</td><td>9</td></tr>
<tr><td>2023</td><td>13</td></tr>
<tr><td>2024</td><td>18</td></tr>
`
}

};

const p=data[player];

document.getElementById("playerName").innerText=p.name;
document.getElementById("playerTable").innerHTML=p.table;

document.getElementById("playerModal").style.display="block";

if(chart){
chart.destroy();
}

const ctx=document.getElementById("playerGraph");

chart=new Chart(ctx,{
type:"line",
data:{
labels:p.years,
datasets:[{
label:"成績推移",
data:p.stats,
borderWidth:3
}]
}
});

}

function closePlayer(){
document.getElementById("playerModal").style.display="none";
}

</script>

</body>
</html>
