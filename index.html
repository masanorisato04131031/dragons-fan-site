<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>中日ドラゴンズファンサイト</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* 全体 */

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

h2{
text-align:center;
margin-top:40px;
}

section{
padding:40px;
}

/* ヘッダー */

header{
background:#0046ad;
color:white;
text-align:center;
padding:20px;
}

nav ul{
display:flex;
justify-content:center;
gap:20px;
list-style:none;
padding:0;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* スライド */

.slider{
width:100%;
height:450px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 2s;
}

.slide.active{
opacity:1;
}

/* NEWS */

.news{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.news-card{
background:white;
padding:20px;
border-radius:10px;
width:250px;
}

/* 選手 */

.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.player{
text-align:center;
cursor:pointer;
}

.player img{
width:100%;
border-radius:10px;
}

/* モーダル */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

.modal-content{
background:white;
width:90%;
max-width:600px;
margin:80px auto;
padding:20px;
border-radius:10px;
}

.close{
float:right;
font-size:30px;
cursor:pointer;
}

/* 動画 */

.video{
text-align:center;
}

video{
width:80%;
max-width:800px;
border-radius:10px;
}

/* グラフ */

canvas{
max-width:800px;
margin:auto;
display:block;
}

</style>

</head>



<body>

<header>

<h1>中日ドラゴンズファンサイト</h1>

<nav>
<ul>
<li><a href="#news">NEWS</a></li>
<li><a href="#players">選手名鑑</a></li>
<li><a href="#video">ハイライト</a></li>
<li><a href="#team">チーム成績</a></li>
</ul>
</nav>

</header>



<!-- トップスライド -->

<div class="slider">

<img class="slide active" src="stadium1.jpg">
<img class="slide" src="stadium2.jpg">
<img class="slide" src="stadium3.jpg">

</div>



<!-- NEWS -->

<section id="news">

<h2>ドラゴンズNEWS</h2>

<div class="news">

<div class="news-card">
<h3>高橋宏斗好投</h3>
<p>7回無失点でチームを勝利に導く</p>
</div>

<div class="news-card">
<h3>岡林猛打賞</h3>
<p>リードオフマンが打線を牽引</p>
</div>

<div class="news-card">
<h3>石川昂弥ホームラン</h3>
<p>若き主砲が決勝弾</p>
</div>

</div>

</section>



<!-- 選手 -->

<section id="players">

<h2>選手名鑑</h2>

<div class="players">

<div class="player" onclick="showPlayer('takahashi')">
<img src="takahashi.jpg">
<p>高橋宏斗</p>
</div>

<div class="player" onclick="showPlayer('yanagi')">
<img src="yanagi.jpg">
<p>柳裕也</p>
</div>

<div class="player" onclick="showPlayer('okabayashi')">
<img src="okabayashi.jpg">
<p>岡林勇希</p>
</div>

<div class="player" onclick="showPlayer('ishikawa')">
<img src="ishikawa.jpg">
<p>石川昂弥</p>
</div>

</div>

</section>



<!-- ハイライト動画 -->

<section id="video">

<h2>試合ハイライト</h2>

<div class="video">

<video controls>

<source src="videoplayback.mp4" type="video/mp4">

</video>

</div>

</section>



<!-- チーム成績 -->

<section id="team">

<h2>チーム成績（過去10年）</h2>

<canvas id="teamChart"></canvas>

</section>



<!-- 選手モーダル -->

<div id="playerModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closePlayer()">×</span>

<h2 id="playerName"></h2>

<table id="playerTable"></table>

</div>

</div>



<script>

/* スライド */

let slideIndex=0;

const slides=document.querySelectorAll(".slide");

setInterval(()=>{

slides.forEach(s=>s.classList.remove("active"));

slideIndex++;

if(slideIndex>=slides.length){
slideIndex=0;
}

slides[slideIndex].classList.add("active");

},4000);



/* 選手データ */

const players={

takahashi:{
name:"高橋宏斗",
table:`
<tr><th>年度</th><th>防御率</th></tr>
<tr><td>2022</td><td>2.47</td></tr>
<tr><td>2023</td><td>2.35</td></tr>
<tr><td>2024</td><td>1.80</td></tr>
`
},

yanagi:{
name:"柳裕也",
table:`
<tr><th>年度</th><th>防御率</th></tr>
<tr><td>2022</td><td>3.64</td></tr>
<tr><td>2023</td><td>2.44</td></tr>
<tr><td>2024</td><td>3.10</td></tr>
`
},

okabayashi:{
name:"岡林勇希",
table:`
<tr><th>年度</th><th>打率</th></tr>
<tr><td>2022</td><td>.291</td></tr>
<tr><td>2023</td><td>.279</td></tr>
<tr><td>2024</td><td>.300</td></tr>
`
},

ishikawa:{
name:"石川昂弥",
table:`
<tr><th>年度</th><th>本塁打</th></tr>
<tr><td>2022</td><td>5</td></tr>
<tr><td>2023</td><td>13</td></tr>
<tr><td>2024</td><td>20</td></tr>
`
}

};

function showPlayer(id){

document.getElementById("playerModal").style.display="block";

document.getElementById("playerName").innerText=players[id].name;

document.getElementById("playerTable").innerHTML=players[id].table;

}

function closePlayer(){

document.getElementById("playerModal").style.display="none";

}



/* チームグラフ */

const ctx=document.getElementById("teamChart");

new Chart(ctx,{
type:"bar",
data:{
labels:["2015","2016","2017","2018","2019","2020","2021","2022","2023","2024"],
datasets:[
{
label:"勝利",
data:[62,58,59,63,68,60,55,66,56,65]
},
{
label:"敗戦",
data:[80,82,79,78,73,76,84,69,82,73]
}
]
}
});

</script>

</body>
</html>
