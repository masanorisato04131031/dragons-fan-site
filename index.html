<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>中日ドラゴンズファンサイト</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#0046ad;
color:white;
text-align:center;
padding:20px;
}

nav ul{
display:flex;
justify-content:center;
gap:20px;
list-style:none;
padding:0;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

section{
padding:40px;
}

h2{
text-align:center;
}

/* スライド */

.slider{
height:450px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 2s;
}

.slide.active{
opacity:1;
}

/* NEWS */

.news{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.news-card{
background:white;
padding:20px;
border-radius:10px;
width:250px;
}

/* 選手 */

.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.player{
text-align:center;
cursor:pointer;
}

.player img{
width:100%;
border-radius:10px;
}

/* モーダル */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

.modal-content{
background:white;
width:90%;
max-width:700px;
margin:80px auto;
padding:20px;
border-radius:10px;
}

.close{
float:right;
font-size:30px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

/* 動画 */

video{
width:80%;
max-width:800px;
display:block;
margin:auto;
}

/* カレンダー */

.calendar{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

.calendar table{
width:100%;
}

.calendar th{
background:#0046ad;
color:white;
}

.calendar td{
height:80px;
vertical-align:top;
}

.game{
font-size:12px;
background:#e6f0ff;
padding:3px;
margin-top:4px;
border-radius:3px;
}

canvas{
max-width:800px;
margin:auto;
display:block;
}

</style>

</style>
  
</head>



<body>

<header>

<h1>中日ドラゴンズファンサイト</h1>

<nav>

<ul>
<li><a href="#news">NEWS</a></li>
<li><a href="#players">選手名鑑</a></li>
<li><a href="#schedule">試合日程</a></li>
<li><a href="#video">ハイライト</a></li>
<li><a href="#team">チーム成績</a></li>
</ul>

</nav>

</header>



<!-- スライド -->

<div class="slider">

<img class="slide active" src="stadium1.jpg">
<img class="slide" src="stadium2.jpg">
<img class="slide" src="stadium3.jpg">

</div>



<!-- NEWS -->

<section id="news">

<h2>ドラゴンズNEWS</h2>

<div class="news">

<div class="news-card">
<h3>高橋宏斗 好投</h3>
<p>7回無失点の好投</p>
</div>

<div class="news-card">
<h3>岡林 猛打賞</h3>
<p>リードオフマンが躍動</p>
</div>

<div class="news-card">
<h3>石川昂弥 ホームラン</h3>
<p>主砲が決勝弾</p>
</div>

</div>

</section>



<!-- 選手 -->

<section id="players">

<h2>選手名鑑</h2>

<div class="players">

<div class="player" onclick="showPlayer('takahashi')">
<img src="takahashi.jpeg">
<p>高橋宏斗</p>
</div>

<div class="player" onclick="showPlayer('yanagi')">
<img src="yanagi.jpeg">
<p>柳裕也</p>
</div>

<div class="player" onclick="showPlayer('okabayashi')">
<img src="okabayashi.jpg">
<p>岡林勇希</p>
</div>

<div class="player" onclick="showPlayer('ishikawa')">
<img src="ishikawa.jpg">
<p>石川昂弥</p>
</div>

</div>

</section>



<!-- 2026試合日程 -->

<section id="schedule">
<section id="schedule">
  <h2>2026年 試合日程</h2>

  <div class="calendar-header">
    <button id="prevMonth">◀ 前の月</button>
    <h3 id="monthTitle"></h3>
    <button id="nextMonth">次の月 ▶</button>
  </div>

  <table class="calendar">
    <thead>
      <tr>
        <th>日</th>
        <th>月</th>
        <th>火</th>
        <th>水</th>
        <th>木</th>
        <th>金</th>
        <th>土</th>
      </tr>
    </thead>
    <tbody id="calendarBody"></tbody>
  </table>
</section>


<!-- 動画 -->

<section id="video">

<h2>試合ハイライト</h2>

<video controls>

<source src="videoplayback.mp4" type="video/mp4">

</video>

</section>



<!-- チーム成績 -->

<section id="team">

<h2>チーム成績（過去10年）</h2>

<canvas id="teamChart"></canvas>

</section>



<script>

/* スライド */

let slideIndex=0;

const slides=document.querySelectorAll(".slide");

setInterval(()=>{

slides.forEach(s=>s.classList.remove("active"));

slideIndex++;

if(slideIndex>=slides.length){
slideIndex=0;
}

slides[slideIndex].classList.add("active");

},4000);


/* チーム成績 */

const ctx=document.getElementById("teamChart");

new Chart(ctx,{
type:"bar",
data:{
labels:["2015","2016","2017","2018","2019","2020","2021","2022","2023","2024"],
datasets:[
{
label:"勝利",
data:[62,58,59,63,68,60,55,66,56,65]
},
{
label:"敗戦",
data:[80,82,79,78,73,76,84,69,82,73]
}
]
}
});

</script>

</body>
</html>
