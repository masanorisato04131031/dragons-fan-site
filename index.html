<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>中日ドラゴンズ応援サイト</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* 選手名鑑 横4人表示 */

.player-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:20px;
}

.player-card{
text-align:center;
cursor:pointer;
}

.player-card img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<h1>中日ドラゴンズ応援サイト</h1>

<nav>
<ul>
<li><a href="#news">NEWS</a></li>
<li><a href="#games">試合</a></li>
<li><a href="#players">選手名鑑</a></li>
<li><a href="#stadium">球場</a></li>
<li><a href="#video">動画</a></li>
<li><a href="#stats">チーム成績</a></li>
</ul>
</nav>

</header>


<section class="hero">

<div class="stadium-slider">

<img class="slide active" src="stadium1.jpg">
<img class="slide" src="stadium2.jpg">
<img class="slide" src="stadium3.jpg">
<img class="slide" src="stadium4.jpg">

</div>

</section>



<section id="news">

<h2>ドラゴンズNEWS</h2>

<div class="news">

<div class="news-card">
<h3>開幕戦勝利！</h3>
<p>ドラゴンズが開幕戦で見事勝利。</p>
</div>

<div class="news-card">
<h3>高橋宏斗好投</h3>
<p>エースが7回無失点の好投。</p>
</div>

</div>

</section>



<section id="games">

<h2>最近の試合</h2>

<table>

<tr>
<th>日付</th>
<th>対戦</th>
<th>結果</th>
</tr>

<tr>
<td>4/1</td>
<td>vs 巨人</td>
<td>○ 4-2</td>
</tr>

<tr>
<td>4/2</td>
<td>vs 巨人</td>
<td>● 1-3</td>
</tr>

</table>

</section>

<section id="players">

<h2>選手名鑑</h2>

<div class="players-grid">

<div class="player" onclick="showPlayer('takahashi')">
<img src="takahashi.jpeg">
<p>高橋宏斗</p>
</div>

<div class="player" onclick="showPlayer('yanagi')">
<img src="yanagi.jpeg">
<p>柳裕也</p>
</div>

<div class="player" onclick="showPlayer('okabayashi')">
<img src="okabayashi.jpg">
<p>岡林勇希</p>
</div>

<div class="player" onclick="showPlayer('ishikawa')">
<img src="ishikawa.jpg">
<p>石川昂弥</p>
</div>

</div>

</section>




<section id="stadium">

<h2>バンテリンドームナゴヤ</h2>

<img src="stadium.jpg">

<p>
中日ドラゴンズの本拠地。  
名古屋市にあるドーム球場。
</p>

</section>



<section id="video">

<h2 style="text-align:center;margin-top:40px;">試合ハイライト</h2>

<video controls style="width:90%;max-width:800px;display:block;margin:20px auto;border-radius:10px;">
<source src="videoplayback.mp4" type="video/mp4">
</video>

</section>



<section id="stats">

<h2>チーム成績</h2>
<canvas id="statsChart"></canvas>

</section>



<footer>
<p>© Dragons Fan Site</p>
</footer>



<div id="playerCard" class="player-card">
<div class="card-content">

<span class="close-btn" onclick="closeCard()">×</span>

<h2 id="playerName"></h2>

<table id="playerStats"></table>

<canvas id="playerChart"></canvas>

</div>
</div>



<script>

let slideIndex=0;
const slides=document.querySelectorAll(".slide");

function showSlide(){

slides.forEach((slide)=>{
slide.classList.remove("active");
});

slideIndex++;

if(slideIndex>=slides.length){
slideIndex=0;
}

slides[slideIndex].classList.add("active");

}

setInterval(showSlide,5000);



function showPlayerCard(player){

const data={

takahashi:{
name:"高橋宏斗",
years:["2022","2023","2024"],
stats:[2.47,2.35,1.80],
table:`
<tr><th>年</th><th>防御率</th></tr>
<tr><td>2022</td><td>2.47</td></tr>
<tr><td>2023</td><td>2.35</td></tr>
<tr><td>2024</td><td>1.80</td></tr>
`
},

yanagi:{
name:"柳裕也",
years:["2022","2023","2024"],
stats:[3.64,2.44,3.10],
table:`
<tr><th>年</th><th>防御率</th></tr>
<tr><td>2022</td><td>3.64</td></tr>
<tr><td>2023</td><td>2.44</td></tr>
<tr><td>2024</td><td>3.10</td></tr>
`
},

okabayashi:{
name:"岡林勇希",
years:["2022","2023","2024"],
stats:[161,163,150],
table:`
<tr><th>年</th><th>安打</th></tr>
<tr><td>2022</td><td>161</td></tr>
<tr><td>2023</td><td>163</td></tr>
<tr><td>2024</td><td>150</td></tr>
`
},

ishikawa:{
name:"石川昂弥",
years:["2022","2023","2024"],
stats:[9,13,18],
table:`
<tr><th>年</th><th>本塁打</th></tr>
<tr><td>2022</td><td>9</td></tr>
<tr><td>2023</td><td>13</td></tr>
<tr><td>2024</td><td>18</td></tr>
`
}

};

const p=data[player];

document.getElementById("playerName").innerText=p.name;
document.getElementById("playerStats").innerHTML=p.table;
document.getElementById("playerCard").style.display="block";

const ctx=document.getElementById("playerChart");

new Chart(ctx,{
type:"line",
data:{
labels:p.years,
datasets:[{
label:"成績推移",
data:p.stats,
fill:false,
borderWidth:3
}]
}
});

}

function closeCard(){
document.getElementById("playerCard").style.display="none";
}

</script>

 <div id="playerModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closePlayer()">&times;</span>

<h2 id="playerName"></h2>

<table id="playerTable"></table>

<canvas id="playerGraph"></canvas>

</div>

</div> 
</body>
</html>
